<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 학습 플래시카드</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        /* 디버깅용 기본 스타일 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
        }
        .btn {
            cursor: pointer;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
        }
        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <!-- Dimming overlay -->
    <div id="dimmingOverlay" class="dimming-overlay"></div>
    
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-graduation-cap"></i> 단어 학습 플래시카드</h1>
            <div class="header-buttons">
                <button id="scoreHistoryBtn" class="btn btn-secondary">
                    <i class="fas fa-chart-bar"></i> 점수 기록
                </button>
                <button id="settingsBtn" class="btn btn-secondary">
                    <i class="fas fa-cog"></i> 설정
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- 시작 화면 -->
            <div id="startScreen" class="screen active">
                <div class="start-content">
                    <h2>단어 학습을 시작하세요!</h2>
                    <p>한 번에 10개의 단어를 학습합니다.</p>
                    <div class="study-info">
                        <div class="info-item">
                            <i class="fas fa-book"></i>
                            <span>총 <span id="totalWords">0</span>개 단어</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-trophy"></i>
                            <span>평균 점수: <span id="avgScore">0</span>점</span>
                        </div>
                    </div>
                    <button id="startBtn" class="btn btn-primary btn-large">
                        <i class="fas fa-play"></i> 학습 시작
                    </button>
                </div>
            </div>

            <!-- 학습 화면 -->
            <div id="studyScreen" class="screen">
                <div class="progress-container">
                    <div class="progress-info">
                        <span>진행률: <span id="currentProgress">1</span>/10</span>
                        <span>점수: <span id="currentScore">0</span>점</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <div class="flashcard-container">
                    <div id="flashcard" class="flashcard">
                        <div class="flashcard-front">
                            <h3 id="wordText" class="word-text"></h3>
                            <p class="word-hint">의미를 맞춰보세요!</p>
                        </div>
                        <div class="flashcard-back">
                            <div id="meaningText" class="meaning-text"></div>
                            <div id="resultIcon" class="result-icon"></div>
                        </div>
                    </div>
                </div>

                <div id="choicesContainer" class="choices-container" style="display: block;">
                    <button class="choice-btn" data-choice="0"></button>
                    <button class="choice-btn" data-choice="1"></button>
                    <button class="choice-btn" data-choice="2"></button>
                    <button class="choice-btn" data-choice="3"></button>
                </div>

                <div id="nextContainer" class="next-container" style="display: none;">
                    <button id="nextBtn" class="btn btn-primary">
                        <i class="fas fa-arrow-right"></i> 다음 단어
                    </button>
                </div>
            </div>

            <!-- 결과 화면 -->
            <div id="resultScreen" class="screen">
                <div class="result-content">
                    <div class="result-header">
                        <i id="resultIcon" class="fas fa-trophy"></i>
                        <h2>학습 완료!</h2>
                    </div>
                    
                    <div class="score-display">
                        <div class="score-circle">
                            <span id="finalScore" class="score-number">0</span>
                            <span class="score-total">/10</span>
                        </div>
                    </div>

                    <div class="score-details">
                        <div class="score-item">
                            <i class="fas fa-check-circle"></i>
                            <span>정답: <span id="correctCount">0</span>개</span>
                        </div>
                        <div class="score-item">
                            <i class="fas fa-times-circle"></i>
                            <span>오답: <span id="incorrectCount">0</span>개</span>
                        </div>
                    </div>

                    <div class="result-actions">
                        <button id="restartBtn" class="btn btn-primary">
                            <i class="fas fa-redo"></i> 다시 학습
                        </button>
                        <button id="backToStartBtn" class="btn btn-secondary">
                            <i class="fas fa-home"></i> 처음으로
                        </button>
                    </div>
                </div>
            </div>

            <!-- 점수 기록 화면 -->
            <div id="scoreHistoryScreen" class="screen">
                <div class="history-header">
                    <h2><i class="fas fa-chart-bar"></i> 점수 기록</h2>
                    <button id="closeHistoryBtn" class="btn btn-secondary">
                        <i class="fas fa-times"></i> 닫기
                    </button>
                </div>
                
                <div id="scoreHistoryList" class="score-history-list">
                    <div class="empty-history">
                        <i class="fas fa-history"></i>
                        <p>아직 기록이 없습니다.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 디버깅용 전역 에러 처리
        window.addEventListener('error', function(e) {
            console.error('전역 에러:', e.error);
        });
        
        // DOM 상태 확인
        document.addEventListener('DOMContentLoaded', function() {
            console.log('HTML 로딩 완료');
            console.log('startBtn 존재:', !!document.getElementById('startBtn'));
        });
    </script>
</body>
</html>
